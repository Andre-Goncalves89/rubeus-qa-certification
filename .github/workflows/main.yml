# Workflow de CI/CD para o projeto Rubeus QA com suporte a execução manual
name: Rubeus QA Pipeline 🐜

on:
  # Roda automaticamente ao subir código para as branches principais
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  
  # Gatilho manual: permite clicar no botão "Run workflow" na aba Actions do GitHub
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar Dependências
        run: npm install

      - name: Executar Testes do Cypress (Headless Mode)
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/**

      - name: Upload de Artefatos (Screenshots em caso de falha)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload de Vídeos (Sempre)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos